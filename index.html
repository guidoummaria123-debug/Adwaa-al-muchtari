<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwa Al Mushtari | Luxury Car Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dark-luxury { background-color: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="dark-luxury font-sans">

    <nav class="flex justify-between items-center p-6 border-b border-gray-800">
        <h1 class="text-2xl font-bold tracking-widest uppercase" data-en="Adwa Al Mushtari" data-ar="أضواء المشتري">Adwa Al Mushtari</h1>
        <div class="space-x-6 flex items-center">
            <button onclick="showPage('home')" data-en="Home" data-ar="الرئيسية">Home</button>
            <button onclick="showPage('inventory')" data-en="Inventory" data-ar="الأسطول">Inventory</button>
            <button onclick="showPage('services')" data-en="Services" data-ar="الخدمات">Services</button>
            <button onclick="showPage('contact')" data-en="Contact" data-ar="اتصل بنا">Contact</button>
            <button onclick="toggleLang()" class="bg-gray-800 px-3 py-1 rounded text-sm hover:text-yellow-500">EN/AR</button>
        </div>
    </nav>

    <main id="content" class="p-8">
        
        <section id="home" class="page">
            <h2 class="text-5xl font-bold mb-4" data-en="Experience Elite Driving" data-ar="اختبر قيادة النخبة">Experience Elite Driving</h2>
            <p class="max-w-2xl text-gray-400" data-en="Premium car rentals for those who demand excellence." data-ar="تأجير سيارات فاخرة لمن يطلب التميز.">Premium car rentals for those who demand excellence.</p>
        </section>

        <section id="inventory" class="page hidden-page">
            <h2 class="text-3xl mb-8" data-en="Our Fleet" data-ar="أسطولنا">Our Fleet</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gray-900 p-4 rounded"><img src="https://source.unsplash.com/800x600/?toyota,luxury-car" class="mb-2 rounded" alt="Toyota">Toyota Models</div>
                <div class="bg-gray-900 p-4 rounded"><img src="https://source.unsplash.com/800x600/?kia,sedan" class="mb-2 rounded" alt="Kia">Kia Models</div>
                <div class="bg-gray-900 p-4 rounded"><img src="https://source.unsplash.com/800x600/?suv,luxury" class="mb-2 rounded" alt="SUV">Modern SUVs</div>
            </div>
        </section>

        <section id="services" class="page hidden-page">
            <h2 class="text-3xl mb-4" data-en="Our Services" data-ar="خدماتنا">Our Services</h2>
            <ul class="list-disc ml-5 space-y-2">
                <li data-en="Chauffeur Services" data-ar="خدمات السائق">Chauffeur Services</li>
                <li data-en="Airport Transfers" data-ar="توصيل المطار">Airport Transfers</li>
                <li data-en="Long-term Leasing" data-ar="تأجير طويل الأمد">Long-term Leasing</li>
            </ul>
        </section>

        <section id="contact" class="page hidden-page">
            <h2 class="text-3xl mb-4" data-en="Contact Us" data-ar="تواصل معنا">Contact Us</h2>
            <a href="https://wa.me/966548374104" class="inline-block bg-green-600 px-6 py-3 rounded font-bold mb-6">WhatsApp: +966 54 837 4104</a>
            <div class="w-full h-96 bg-gray-800">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3624.5!2d46.7!3d24.7!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjnCsDQyJzAwLjAiTiA0NsKwNDInMDAuMCJF!5e0!3m2!1sen!2ssa!4v1!5m2!1sen!2ssa" class="w-full h-full grayscale border-0" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>

    <script>
        let currentLang = 'en';

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(pageId).classList.remove('hidden-page');
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
        }
    </script>
</body>
</html>
